<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Генератор Музыкальной Лотереи</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/lucide/0.447.0/lucide.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Tektur:wght@400;600;900&display=swap');
        
        :root {
            --primary-red: #D12F22;
        }

        body { 
            font-family: 'Tektur', sans-serif; 
            background-color: #f1f5f9; 
            margin: 0;
            padding: 0;
            -webkit-font-smoothing: antialiased;
        }

        /* --- КРИТИЧЕСКИЕ НАСТРОЙКИ PDF (УСТРАНЕНИЕ ЛИШНИХ СТРАНИЦ) --- */
        @media print {
            @page {
                size: A5 portrait;
                margin: 0;
            }
            html, body {
                width: 148mm;
                /* Не фиксируем высоту body жестко в 210, чтобы не провоцировать разрыв */
                height: auto;
                background-color: #D12F22 !important;
                -webkit-print-color-adjust: exact !important;
                print-color-adjust: exact !important;
                color-adjust: exact !important;
            }
            .no-print {
                display: none !important;
            }
            .ticket-page-wrapper {
                width: 148mm;
                /* Используем 209.8 вместо 210, чтобы избежать лишней пустой страницы */
                height: 209.8mm;
                page-break-after: always;
                page-break-inside: avoid;
                break-inside: avoid;
                display: flex !important;
                align-items: center; 
                justify-content: center;
                background-color: #D12F22 !important;
                overflow: hidden;
            }
            .ticket-capture-area {
                box-shadow: none !important;
                border: none !important;
                background-color: #D12F22 !important;
            }
            .bingo-cell {
                background-color: #fff !important;
                -webkit-print-color-adjust: exact !important;
            }
        }

        /* --- КОНСТРУКЦИЯ БИЛЕТА --- */
        .ticket-capture-area {
            width: 148mm;
            /* Высота самого макета внутри страницы */
            height: 195mm; 
            background: var(--primary-red);
            color: white;
            box-sizing: border-box;
            padding: 8mm 10mm; 
            display: flex;
            flex-direction: column;
            position: relative;
            overflow: hidden;
        }

        /* Шапка */
        .header-labels {
            display: flex;
            justify-content: space-between;
            font-size: 7pt;
            font-weight: 900;
            text-transform: uppercase;
            letter-spacing: 0.3mm;
        }
        .dotted-divider {
            border-top: 1.5pt dotted white;
            width: 100%;
            margin: 2mm 0;
            height: 0;
        }

        /* Заголовок ЛОТЕРЕЯ */
        .main-title {
            font-size: 68pt;
            font-weight: 900;
            line-height: 0.8;
            text-align: center;
            letter-spacing: 1.5mm;
            text-transform: uppercase;
            margin: 1mm 0;
            transform: translateY(-1mm);
        }

        /* Сетка */
        .grid-container {
            display: grid;
            grid-template-columns: repeat(5, 1fr);
            grid-template-rows: repeat(5, 1fr);
            gap: 1.5mm;
            height: 95mm; 
            margin: 2mm 0;
        }

        .bingo-cell {
            background: white;
            display: flex;
            align-items: center;
            justify-content: center;
            text-align: center;
            padding: 1.5mm;
            box-sizing: border-box;
            border-radius: 1px;
        }

        .cell-content {
            font-size: 8.5pt;
            font-weight: 700;
            color: var(--primary-red);
            line-height: 1.1;
            word-wrap: break-word;
            width: 100%;
            transform: translateY(0.5mm); 
        }

        /* Футер */
        .footer-content {
            margin-top: auto;
            display: flex;
            flex-direction: column;
            gap: 3mm;
        }

        .footer-text {
            font-size: 7pt;
            font-weight: 900;
            text-align: center;
            text-transform: uppercase;
            letter-spacing: 0.1mm;
            opacity: 0.9;
        }

        .icons-row {
            display: flex;
            justify-content: space-between;
            padding: 0 4mm;
        }

        .icon-unit {
            width: 13mm;
            height: 13mm;
            border: 0.4mm solid rgba(255,255,255,0.4);
            background: rgba(255,255,255,0.1);
            position: relative;
        }

        .line-v { width: 0.6mm; height: 100%; background: white; position: absolute; left: 50%; top:0; transform: translateX(-50%); }
        .line-h { height: 0.6mm; width: 100%; background: white; position: absolute; top: 50%; left:0; transform: translateY(-50%); }
        .line-d1 { height: 0.6mm; width: 140%; background: white; position: absolute; top: 50%; left: -20%; transform: rotate(45deg); }
        .line-d2 { height: 0.6mm; width: 140%; background: white; position: absolute; top: 50%; left: -20%; transform: rotate(-45deg); }

        /* Панель управления */
        .admin-panel { background: white; border-radius: 16px; box-shadow: 0 10px 40px -10px rgba(0,0,0,0.1); border: 1px solid #e2e8f0; }
        .scroll-area { max-height: 400px; overflow-y: auto; scrollbar-width: thin; }
    </style>
</head>
<body class="p-4 md:p-8">

    <div class="max-w-6xl mx-auto no-print mb-12">
        <header class="mb-10 text-center">
            <h1 class="text-4xl font-black text-slate-900 uppercase tracking-tighter">Бинго-Генератор v9.1</h1>
            <p class="text-slate-500 font-bold uppercase text-xs tracking-widest mt-2">Фикс лишних страниц PDF • Макет 195мм</p>
        </header>

        <div class="grid grid-cols-1 lg:grid-cols-12 gap-8">
            <div class="lg:col-span-8 admin-panel p-6">
                <div class="flex justify-between items-center mb-4">
                    <h2 class="font-black text-slate-800 uppercase text-xs tracking-widest">Плейлист (50 песен)</h2>
                </div>
                <div id="playlistInputs" class="grid grid-cols-1 md:grid-cols-2 gap-x-6 scroll-area pr-4"></div>
            </div>

            <div class="lg:col-span-4 flex flex-col gap-4">
                <div class="admin-panel p-6">
                    <h2 class="font-black text-slate-800 uppercase text-xs tracking-widest mb-4">Пустышки (10)</h2>
                    <div id="dummyInputs" class="space-y-2"></div>
                </div>
                
                <button onclick="generateAll()" class="w-full bg-slate-900 hover:bg-black text-white py-4 font-black uppercase tracking-widest flex items-center justify-center gap-2 transition-all rounded-xl">
                    <i data-lucide="refresh-cw" class="w-5 h-5"></i> Обновить билеты
                </button>
                <button onclick="window.print()" class="w-full bg-red-600 hover:bg-red-700 text-white py-4 font-black uppercase tracking-widest flex items-center justify-center gap-2 shadow-xl shadow-red-200 transition-all rounded-xl">
                    <i data-lucide="printer" class="w-5 h-5"></i> Сохранить PDF
                </button>
            </div>
        </div>
    </div>

    <div id="ticketsContainer" class="flex flex-col items-center gap-12"></div>

    <script>
        const initialSongs = ["Zoloto — Дома", "Hi Fi — Не дано", "Cream Soda — Отпускаю", "Тимати — Понты", "Quest Pistols — Ты так красива", "Сплин — Остаемся зимовать", "ЛСП — безумие", "Fergie — London Bridge", "Бумбокс — Хоттабыч", "Алена Свиридова — Розовый фламинго", "Монеточка — Селфхарм", "Кровосток — Весна", "Ramil — Сон", "Дмитрий Маликов — Ты одна ты такая", "Ваня Дмитриенко — Вишневый", "ICEGERGERT — G woman", "Бузова — Мало половин", "Арсен Шахунц — Девочка, stop", "Бьянка — че че", "Глюкоза — Глюкоза Ностра", "Reamonn — Supergirl", "Клава Кока — Покинула чат", "Eminem — Without me", "Руки вверх — Он тебя целует", "Серебро — В космосе", "Тимати — Хавчик", "Агата кристи — Черная луна", "Ноггано — Девочка", "Jakone — По весне", "Rozhden — Знаешь", "Баста — Вечно молодой", "Фабрика — Про любовь", "INSTASAMKA — За деньги да", "Максим — Ветром стать", "L one — Все или ничего", "Земфира — Хочешь?", "Анна Асти — Повело", "Hollyflame — Тону", "MOLLY — Мальчик", "Леонид Агутин — Королева", "Technotronic — Pump Up The Jam", "ЛАУД — My life my rules", "Моя Мишель — Посмотри в глаза", "Moreart — Tom Ford", "Анжелика Варум — Художник, что рисует дождь", "toxis — nobody", "Коррупция — Красный бархат", "Тима Белорусских — Одуванчик", "Юля Савичева — Привет", "Pizza — Романс"];
        const initialDummies = ["Кино — Группа крови", "Queen — We Will Rock You", "ABBA — Dancing Queen", "Мумий Тролль — Владивосток 2000", "Би-2 — Полковнику никто не пишет", "Britney Spears — Toxic", "Ленинград — Экспонат", "Nirvana — Smells Like Teen Spirit", "Григорий Лепс — Рюмка водки", "Linkin Park — In the End"];

        function setupUI() {
            const pCont = document.getElementById('playlistInputs');
            for(let i=0; i<50; i++) {
                const isR = [14, 29, 49].includes(i);
                pCont.innerHTML += `
                    <div class="flex items-center gap-2 mb-1">
                        <span class="text-[10px] w-5 text-slate-400 font-mono font-bold">${i+1}.</span>
                        <input type="text" class="song-in flex-1 p-1.5 text-[11px] border ${isR ? 'border-red-400 bg-red-50' : 'border-slate-100'} rounded font-semibold outline-none" value="${initialSongs[i] || ''}">
                    </div>`;
            }
            const dCont = document.getElementById('dummyInputs');
            for(let i=0; i<10; i++) {
                dCont.innerHTML += `
                    <div class="flex items-center gap-2">
                        <span class="text-[9px] w-4 text-slate-300 font-mono font-bold">${i+1}.</span>
                        <input type="text" class="dummy-in flex-1 p-1.5 text-[11px] border border-slate-100 rounded font-semibold outline-none" value="${initialDummies[i] || ''}">
                    </div>`;
            }
            lucide.createIcons();
            generateAll();
        }

        function shuffle(array) {
            for (let i = array.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [array[i], array[j]] = [array[j], array[i]];
            }
            return array;
        }

        function createGrid(id, playlist, dummies) {
            const grid = Array(25).fill(null);
            if (id === 1) {
                const last = playlist[14];
                const pool = shuffle([...playlist.slice(0, 14)]);
                grid[0] = last;
                for(let i=1; i<5; i++) grid[i] = pool[i-1];
                const safe = shuffle([...playlist.slice(15), ...dummies]);
                let sIdx = 0;
                for(let i=5; i<25; i++) grid[i] = safe[sIdx++];
            } 
            else if (id === 2 || id === 3) {
                const last = playlist[29];
                const pool = shuffle([...playlist.slice(0, 29)]);
                grid[0] = last;
                for(let i=1; i<10; i++) grid[i] = pool[i-1];
                const safe = shuffle([...playlist.slice(30), ...dummies]);
                let sIdx = 0;
                for(let i=10; i<25; i++) grid[i] = safe[sIdx++];
            } 
            else if (id === 4) {
                const pool = shuffle([...playlist.slice(0, 49)]);
                grid[0] = playlist[49];
                for(let i=1; i<25; i++) grid[i] = pool[i-1];
            } 
            else {
                const dums = shuffle([...dummies]);
                const pool = shuffle([...playlist.slice(0, 50)]);
                const blocks = [0, 6, 12, 18, 24, 4, 8, 16, 20];
                blocks.forEach((idx, i) => grid[idx] = dums[i]);
                let pIdx = 0;
                for(let i=0; i<25; i++) if(!grid[i]) grid[i] = pool[pIdx++];
            }
            return grid;
        }

        function generateAll() {
            const playlist = Array.from(document.querySelectorAll('.song-in')).map(i => i.value.trim()).filter(v => v);
            const dummies = Array.from(document.querySelectorAll('.dummy-in')).map(i => i.value.trim()).filter(v => v);
            const container = document.getElementById('ticketsContainer');
            container.innerHTML = '';

            for (let i = 1; i <= 20; i++) {
                const data = createGrid(i, playlist, dummies);
                const meta = i===1?"Победа R1 (15)":i===2||i===3?"Победа R2 (30)":i===4?"Победа R3 (50)":"Обычный";
                
                container.innerHTML += `
                <div class="ticket-page-wrapper">
                    <div class="flex flex-col items-center">
                        <div class="w-[148mm] flex justify-between p-2 text-[10px] font-black text-slate-400 no-print uppercase tracking-widest">
                            <span>БИЛЕТ №${i}</span>
                            <span class="text-red-500">${meta}</span>
                        </div>
                        <div class="ticket-capture-area shadow-2xl">
                            <div>
                                <div class="header-labels">
                                    <span>ПРОХОДНАЯ</span>
                                    <span>ПРОФСОЮЗНАЯ МУЗЫКАЛЬНАЯ</span>
                                    <span>БИЛЕТ №${i}</span>
                                </div>
                                <div class="dotted-divider"></div>
                                <h2 class="main-title">ЛОТЕРЕЯ</h2>
                                <div class="dotted-divider" style="margin-top: -1mm"></div>
                            </div>

                            <div class="grid-container">
                                ${data.map(s => `<div class="bingo-cell"><div class="cell-content">${s}</div></div>`).join('')}
                            </div>

                            <div class="footer-content">
                                <div class="footer-text">СЛУШАЙ МУЗЫКУ, УГАДЫВАЙ ИСПОЛНИТЕЛЯ И ВЫЧЁРКИВАЙ НАЗВАНИЯ!</div>
                                <div class="icons-row">
                                    <div class="icon-unit"><div class="line-v"></div></div>
                                    <div class="icon-unit"><div class="line-h"></div></div>
                                    <div class="icon-unit"><div class="line-d1"></div></div>
                                    <div class="icon-unit"><div class="line-d2"></div></div>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>`;
            }
        }

        window.onload = setupUI;
    </script>
</body>
</html>
